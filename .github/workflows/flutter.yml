name: Flutter CI

on:
  push:
    branches: [ main ]
    tags: 
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 🗄️ Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: ⚡ Cache Flutter
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.lock') }}

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7' 

      - name: 📦 Install Dependencies
        run: flutter pub get

      - name: 🧪 Run Tests
        run: flutter test
        continue-on-error: true 

      - name: 🏗️ Build APK
        run: |
          # 1. Jalankan pancingan build & Gradle
          flutter build apk --release --no-tree-shake-icons || true
          cd android
          chmod +x gradlew || true
          ./gradlew assembleRelease --no-daemon
          cd ..
          
          # 2. Cari file APK secara dinamis
          # Mencari file .apk di folder build/app/outputs yang ada kata 'release'
          APK_PATH=$(find build/app/outputs -name "*release.apk" | head -n 1)
          
          # 3. Export ke environment agar bisa dibaca step lain
          if [ -z "$APK_PATH" ]; then
            echo "❌ ERROR: File APK tidak ditemukan!"
            exit 1
          fi
          
          echo "FINAL_APK_PATH=$APK_PATH" >> $GITHUB_ENV
          echo "✅ APK ditemukan di: $APK_PATH"

      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: ${{ env.FINAL_APK_PATH }}
      
      - name: 🚀 Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "Release ${{ github.ref_name }}"
          files: ${{ env.FINAL_APK_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📢 Notify Telegram (Success)
        if: success()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d text="✅ Build Berhasil! Commit: ${{ github.sha }} | Path: ${{ env.FINAL_APK_PATH }}"

      - name: 📤 Send APK to Telegram
        if: success()
        run: |
          curl -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument \
          -F chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -F document=@${{ env.FINAL_APK_PATH }} \
          -F caption="📦 APK Sanggar Mobile terbaru 🚀"