name: Flutter CI/CD

on:
  push:
    branches: [ main ]
    tags: 
      - 'v*'
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        flutter-version: [3.16.0, 3.19.0] 

    steps:
      - name: 🗄️ Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: ⚡ Cache Flutter
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-flutter-${{ matrix.flutter-version }}-${{ hashFiles('**/pubspec.lock') }}

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ matrix.flutter-version }}

      - name: 📦 Install Dependencies
        run: flutter pub get

      # Step test ini dibiarkan, tapi 'continue-on-error' agar build tidak berhenti jika test gagal
      - name: 🧪 Run Tests
        run: flutter test
        continue-on-error: true 

      # Kita pakai build lewat Gradle langsung agar TIDAK error "Already watching path"
      - name: 🏗️ Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
          cd ..

      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-flutter-${{ matrix.flutter-version }}
          path: build/app/outputs/apk/release/app-release.apk
      
      - name: 🚀 Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "Release ${{ github.ref_name }}"
          files: build/app/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📢 Send APK to Telegram
        if: success()
        run: |
          curl -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument \
          -F chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -F document=@build/app/outputs/apk/release/app-release.apk \
          -F caption="✅ APK Berhasil di-build (Flutter ${{ matrix.flutter-version }})"

      - name: ❌ Notify Failed
        if: failure()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d text="❌ Build gagal pada versi Flutter ${{ matrix.flutter-version }}"